<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cuts Golf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
        }

        header {
            background-color: #0d4a1f;
            padding: 20px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #fff;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .social-links a {
            display: inline-block;
            padding: 12px 24px;
            background-color: #1a9c3d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1em;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .social-links a:hover {
            background-color: #157030;
            transform: scale(1.05);
        }

        main {
            text-align: center;
            padding: 60px 0;
        }

        .hero {
            background: linear-gradient(135deg, #0d4a1f 0%, #1a9c3d 100%);
            padding: 80px 20px;
            border-radius: 10px;
            margin: 40px 0;
        }

        .hero h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2em;
            line-height: 1.6;
        }

        footer {
            background-color: #0d4a1f;
            padding: 20px 0;
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🏌️ Fresh Cuts Golf 🏌️</h1>
            <nav class="social-links">
                <a href="https://www.youtube.com" target="_blank">📺 YouTube</a>
                <a href="https://www.facebook.com" target="_blank">📘 Facebook</a>
                <a href="https://www.tiktok.com" target="_blank">🎵 TikTok</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="hero">
                <h2>Welcome to Fresh Cuts Golf</h2>
                <p>Your premium destination for golf excellence and style</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Fresh Cuts Golf. All rights reserved.</p>
    </footer>
</body>
</html>
